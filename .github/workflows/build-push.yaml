# Pipeline CI/CD para build e deploy local no K3S
# Roda no self-hosted runner instalado no EC2
# Fluxo: checkout → docker build → import no K3S → rollout restart
name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t node-app-example:latest .

      - name: Import image into K3S
        run: docker save node-app-example:latest | sudo k3s ctr images import -

      - name: Deploy to K3S
        run: kubectl rollout restart deployment/node-app -n default

      - name: Wait for rollout
        run: kubectl rollout status deployment/node-app -n default --timeout=120s

      - name: Verify
        run: kubectl get pods -n default -l app.kubernetes.io/name=node-app
